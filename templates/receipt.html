<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 32px 40px;
    }

    .receipt {
      max-width: 480px;
      margin: 0 auto;
      border: 2px solid #333;
      border-radius: 4px;
      padding: 28px 32px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 16px;
    }
    .header .company { font-size: 15px; color: #555; margin-bottom: 6px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }

    .meta-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    .meta-table td {
      padding: 5px 4px;
      vertical-align: top;
    }
    .meta-table td:first-child {
      width: 80px;
      color: #555;
      white-space: nowrap;
    }
    .meta-table td:last-child {
      font-weight: 600;
    }

    .divider {
      border: none;
      border-top: 1px dashed #bbb;
      margin: 14px 0;
    }

    .items {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    .items th, .items td {
      padding: 7px 8px;
      text-align: right;
    }
    .items th:first-child, .items td:first-child {
      text-align: left;
    }
    .items thead tr {
      background: #f0f0f0;
      font-weight: 700;
      font-size: 12px;
    }
    .items tbody tr:nth-child(even) {
      background: #fafafa;
    }
    .items tbody tr td {
      border-bottom: 1px solid #eee;
    }

    .total-row {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    .total-row td {
      padding: 8px 8px;
    }
    .total-row .label {
      font-size: 14px;
      font-weight: 700;
    }
    .total-row .amount {
      text-align: right;
      font-size: 20px;
      font-weight: 700;
      color: #c0392b;
    }

    .footer {
      margin-top: 24px;
      border-top: 1px solid #ccc;
      padding-top: 14px;
      font-size: 11px;
      color: #888;
      text-align: right;
    }

    .stamp-area {
      margin-top: 28px;
      display: flex;
      justify-content: flex-end;
      gap: 48px;
    }
    .stamp-box {
      text-align: center;
      font-size: 11px;
      color: #555;
    }
    .stamp-box .line {
      width: 80px;
      border-top: 1px solid #999;
      margin: 36px auto 4px;
    }
  </style>
</head>
<body>
  <div class="receipt">
    <div class="header">
      <div class="company">{{ company }}</div>
      <h1>列印費用收款單</h1>
    </div>

    <table class="meta-table">
      <tr>
        <td>統計期間</td>
        <td>{{ period }}</td>
      </tr>
      <tr>
        <td>員工編號</td>
        <td>{{ employee_id }}</td>
      </tr>
      {% if name %}
      <tr>
        <td>姓　　名</td>
        <td>{{ name }}</td>
      </tr>
      {% endif %}
    </table>

    <hr class="divider">

    <table class="items">
      <thead>
        <tr>
          <th>項目</th>
          <th>張數</th>
          <th>單價</th>
          <th>小計</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>黑白列印</td>
          <td>{{ bw }}</td>
          <td>$3</td>
          <td>${{ bw_cost }}</td>
        </tr>
        <tr>
          <td>彩色列印</td>
          <td>{{ color }}</td>
          <td>$10</td>
          <td>${{ color_cost }}</td>
        </tr>
      </tbody>
    </table>

    <hr class="divider">

    <table class="total-row">
      <tr>
        <td class="label">合計金額</td>
        <td class="amount">NT$ {{ total }} 元</td>
      </tr>
    </table>

    <div class="stamp-area">
      <div class="stamp-box">
        <div class="line"></div>
        經手人
      </div>
      <div class="stamp-box">
        <div class="line"></div>
        繳款人
      </div>
    </div>

    <div class="footer">列印日期：{{ generated_date }}</div>
  </div>
</body>
</html>
